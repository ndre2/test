workflows:
  android-build:
    name: Build Android APK
    triggering:
      events:
        - push
    scripts:
      - name: Setup build environment
        script: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.30 kivy>=2.3.0
      - name: Create APK
        script: |
          cd sec
          buildozer android debug
      - name: Find APK files
        script: |
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f -o -name "*.buildozer" -type d
          echo "=== Listing sec/bin directory ==="
          ls -la sec/bin/ || echo "No bin directory found"
    artifacts:
      - sec/bin/**/*.apk
